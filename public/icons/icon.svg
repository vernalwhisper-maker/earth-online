<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="earth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <rect width="200" height="200" rx="32" fill="url(#earth)"/>
  <!-- 地球 -->
  <circle cx="100" cy="100" r="65" fill="url(#ocean)" opacity="0.9"/>
  <!-- 大陆（简笔画） -->
  <path d="M70 60 Q90 55 100 70 Q115 80 120 75 Q135 70 140 85 Q145 100 135 110 Q125 120 115 115 Q100 105 95 115 Q85 130 75 120 Q65 110 60 95 Q55 80 70 60Z" fill="#10b981" opacity="0.7"/>
  <path d="M130 130 Q140 125 145 135 Q150 145 140 150 Q130 155 125 145 Q120 135 130 130Z" fill="#10b981" opacity="0.7"/>
  <!-- 轨道环 -->
  <ellipse cx="100" cy="100" rx="82" ry="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" transform="rotate(-20 100 100)"/>
  <ellipse cx="100" cy="100" rx="82" ry="30" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1" transform="rotate(-20 100 100)" stroke-dasharray="4 4"/>
</svg>
